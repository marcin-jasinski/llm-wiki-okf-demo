# Local self-hosted xWiki for the demo's remote wiki backend (ticket 03).
#   docker compose up -d          then:   python docker/setup_xwiki.py
# Web UI / REST: http://localhost:8080  (superadmin / see setup_xwiki.py)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: xwiki
      POSTGRES_PASSWORD: xwiki
      POSTGRES_DB: xwiki
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - db-data:/var/lib/postgresql/data

  xwiki:
    image: xwiki:stable-postgres-tomcat
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_USER: xwiki
      DB_PASSWORD: xwiki
      DB_DATABASE: xwiki
      DB_HOST: db
    volumes:
      - xwiki-data:/usr/local/xwiki

volumes:
  db-data:
  xwiki-data:
